<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Zokir Media Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<button onclick="document.getElementById('loginBox').style.display='block'">Админ</button>

<div id="loginBox" style="display:none; position:fixed; top:20%; left:40%; background:#fff; padding:20px; border:1px solid #000;">
    <input type="password" id="passInput" placeholder="Парол">
    <button onclick="checkAuth()">Кириш</button>
</div>

<div id="adminPanel" style="display:none; background:#eee; padding:20px;">
    <h2>Админ панел</h2>
    <input type="text" id="mName" placeholder="Номи">
    <textarea id="mEmbed" placeholder="Embed код"></textarea>
    <button onclick="saveMovie()">Сақлаш</button>
</div>

<div id="movieGrid"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAV9u_Go4bIuDlC-vM3rH1T9MwLGwe9H3I",
        databaseURL: "https://universal-media-8f205-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal-media-8f205"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Паролни текшириш
    function checkAuth() {
        if(document.getElementById('passInput').value === "1975") {
            localStorage.setItem('isAdmin', 'true'); // Админлигини сақлаб қўямиз
            location.reload(); // Саҳифани янгилаймиз
        } else {
            alert("Парол нотўғри!");
        }
    }

    // Саҳифа очилганда админлигини текшириш
    const isAdmin = localStorage.getItem('isAdmin') === 'true';
    if(isAdmin) {
        document.getElementById('adminPanel').style.display = 'block';
    }

    // Маълумотларни ўқиш ва кўрсатиш
    db.ref('movies').on('value', (snapshot) => {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';
        const data = snapshot.val() || {};
        
        Object.keys(data).forEach(key => {
            const m = data[key];
            const div = document.createElement('div');
            div.innerHTML = `<h3>${m.name}</h3><div>${m.embed}</div>`;
            if(isAdmin) {
                div.innerHTML += `<button onclick="deleteMovie('${key}')">Ўчириш</button>`;
            }
            grid.appendChild(div);
        });
    });

    function saveMovie() {
        const name = document.getElementById('mName').value;
        const embed = document.getElementById('mEmbed').value;
        db.ref('movies').push({ name, embed });
        alert("Сақланди!");
    }

    function deleteMovie(key) {
        db.ref('movies/' + key).remove();
    }
</script>
</body>
</html>
