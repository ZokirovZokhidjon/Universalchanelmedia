    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* МОБИЛ ХЕДЕР (Фақат телефон ва планшетлар учун) */
        .mobile-header {
            display: none;
            width: 100%;
            height: 60px;
            background-color: #141414;
            border-bottom: 2px solid #ef1a4a;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
        }
        .mobile-logo {
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ef1a4a, #ff5e62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .menu-toggle-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
        }
        .menu-toggle-btn:hover {
            color: #ef1a4a;
        }

        /* ЧАП ТОМОН: Каналлар рўйхати */
        .sidebar {
            width: 350px;
            background: linear-gradient(180deg, #141414 0%, #0a0a0a 100%);
            border-right: 2px solid #ef1a4a; /* RuTV ўзига хос малина ранги */
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.7);
            z-index: 15;
            transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 20px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            text-align: center;
        }
        .sidebar-header h3 {
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ef1a4a, #ff5e62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        
        /* Тезкор қидирув майдони */
        .search-box {
            padding: 10px 20px;
            background-color: #141414;
        }
        .search-box input {
            width: 100%;
            padding: 10px 15px;
            background-color: #222;
            border: 1px solid #333;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: #ef1a4a;
            box-shadow: 0 0 10px rgba(239, 26, 74, 0.3);
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .channel-list::-webkit-scrollbar {
            width: 6px;
        }
        .channel-list::-webkit-scrollbar-thumb {
            background-color: #333;
            border-radius: 4px;
        }
        .channel-list::-webkit-scrollbar-thumb:hover {
            background-color: #ef1a4a;
        }

        /* Канал элементи */
        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .channel-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }
        .channel-item.active {
            background: linear-gradient(90deg, rgba(239, 26, 74, 0.2) 0%, rgba(0, 0, 0, 0) 100%);
            border-left: 3px solid #ef1a4a;
        }
        .channel-logo-placeholder {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            background: linear-gradient(135deg, #ef1a4a, #7b1fa2);
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
        .channel-info {
            flex: 1;
            overflow: hidden;
        }
        .channel-name {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #e0e0e0;
        }
        .channel-item.active .channel-name {
            color: #fff;
        }

        /* ЎНГ ТОМОН: Плеер Майдони */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #070707;
            position: relative;
        }
        
        .player-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: radial-gradient(circle, #1a1a1a 0%, #070707 100%);
        }
        .player-container {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(239, 26, 74, 0.15);
            position: relative;
        }

        /* VIDEO.JS ПЛЕЕРИНИНГ НЕОН УСЛУБИДАГИ СТИЛЛАРИ */
        .video-js {
            width: 100% !important;
            height: 100% !important;
            border-radius: 12px;
        }
        .video-js .vjs-big-play-button {
            background-color: rgba(239, 26, 74, 0.8) !important;
            border: 2px solid #ef1a4a !important;
            border-radius: 50% !important;
            width: 70px !important;
            height: 70px !important;
            line-height: 66px !important;
            margin-left: -35px !important;
            margin-top: -35px !important;
            box-shadow: 0 0 20px #ef1a4a !important;
            transition: all 0.3s ease !important;
        }
        .video-js:hover .vjs-big-play-button {
            background-color: #ef1a4a !important;
            transform: scale(1.1);
            box-shadow: 0 0 30px #ff5e62 !important;
        }
        .video-js .vjs-control-bar {
            background-color: rgba(10, 10, 10, 0.85) !important;
            backdrop-filter: blur(10px);
            height: 50px !important;
        }
        .video-js .vjs-play-progress, .video-js .vjs-volume-level {
            background-color: #ef1a4a !important;
        }
        .video-js .vjs-load-progress {
            background-color: rgba(255, 255, 255, 0.2) !important;
        }

        /* Пастки маълумотлар панели */
        .player-footer {
            padding: 25px 40px;
            background: #0f0f0f;
            border-top: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .current-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .current-icon {
            font-size: 24px;
            color: #ef1a4a;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        .current-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .live-badge {
            background-color: #ef1a4a;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(239, 26, 74, 0.5);
            display: none; /* Канал танланганда кўринади */
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* ЭКРАН ТУЗАТИШЛАРИ (MEDIA QUERIES) */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: auto;
            }
            .mobile-header {
                display: flex;
            }
            
            /* Каналлар блокини мобилда яшириш */
            .sidebar {
                position: fixed;
                top: 60px;
                left: 0;
                height: calc(100vh - 60px);
                width: 280px;
                transform: translateX(-100%);
                border-right: 2px solid #ef1a4a;
                border-top: 1px solid #2a2a2a;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-header {
                display: none;
            }

            /* Асосий қисмни мобилга мослаш */
            .main-content {
                margin-top: 60px;
                height: calc(100vh - 60px);
                width: 100%;
            }
            .player-wrapper {
                padding: 10px;
                background: #070707;
            }
            .player-container {
                border-radius: 6px;
            }
            .player-footer {
                padding: 15px 20px;
            }
            .current-title {
                font-size: 16px;
            }
        }

        let channels = [];
        let player;

        // Саҳифа юкланганда ишга тушадиган функция
        document.addEventListener('DOMContentLoaded', () => {
            // VideoJS ни фаоллаштириш
            player = videojs('videoPlayer', {
                fluid: true,
                playbackRates: [0.5, 1, 1.5, 2]
            });

            parseM3u(rawM3uData);
            renderChannels(channels);
        });
  // Запис функцияси
        recBtn.onclick = () => {
            const videoElement = document.querySelector('video');
            if (recBtn.innerText === "ЗАПИС ҚИЛИШ") {
                const stream = videoElement.captureStream ? videoElement.captureStream() : videoElement.mozCaptureStream();
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'record.webm';
                    a.click();
                };
                mediaRecorder.start();
                recBtn.innerText = "ТЎХТАТИШ";
                recBtn.classList.add('recording');
            } else {
                mediaRecorder.stop();
                recBtn.innerText = "ЗАПИС ҚИЛИШ";
                recBtn.classList.remove('recording');
            }
        };

        // M3U матнини таҳлил қилиб массивга ўтказиш
        function parseM3u(data) {
            const lines = data.split('\n');
            let currentName = '';

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    // Канал номини ажратиб олиш
                    const commaIndex = line.indexOf(',');
                    if (commaIndex !== -1) {
                        currentName = line.substring(commaIndex + 1).trim();
                    }
                } else if (line.startsWith('http://') || line.startsWith('https://')) {
                    if (currentName) {
                        channels.push({
                            name: currentName,
                            url: line
                        });
                        currentName = '';
                    }
                }
            }
        }

        // Каналларни рўйхат сифатида HTML га чиқариш
        function renderChannels(channelsToRender) {
            const listContainer = document.getElementById('channelList');
            listContainer.innerHTML = '';

            if (channelsToRender.length === 0) {
                listContainer.innerHTML = '<div style="text-align:center; padding:20px; color:#666;">Канал топилмади</div>';
                return;
            }

            channelsToRender.forEach((channel, index) => {
                const item = document.createElement('div');
                item.className = 'channel-item';
                // Биринчи ҳарфдан логотип ясаш
                const shortName = channel.name.substring(0, 2).toUpperCase();

                item.innerHTML = `
                    <div class="channel-logo-placeholder">${shortName}</div>
                    <div class="channel-info">
                        <div class="channel-name">${channel.name}</div>
                    </div>
                `;

                item.onclick = () => selectChannel(channel, item);
                listContainer.appendChild(item);
            });
        }

        // Канал танланганда плеерда қўйиш
        function selectChannel(channel, element) {
            // Аввалги актив элементни ўчириш
            const activeItem = document.querySelector('.channel-item.active');
            if (activeItem) activeItem.classList.remove('active');

            // Янгисини актив қилиш
            element.classList.add('active');

            // Пастки панелни янгилаш
            document.getElementById('currentTrackTitle').innerText = channel.name;
            document.getElementById('liveStatus').style.display = 'block';

            // Плеерга видео йўлини бериш
            let type = 'application/x-mpegURL'; // HLS (m3u8) учун стандарт
            if (channel.url.endsWith('.mp4')) {
                type = 'video/mp4';
            }

            player.src({
                src: channel.url,
                type: type
            });

            player.play().catch(error => {
                console.log("Автоматик ижро этишда хатолик (Браузер чекловлари туфайли):", error);
            });

            // Мобилда канал танланганда меню автоматик ёпилсин
            if (window.innerWidth <= 768) {
                toggleSidebar();
            }
        }

        // Қидирув тизими
        function filterChannels() {
            const query = document.getElementById('searchChannel').value.toLowerCase();
            const filtered = channels.filter(channel => 
                channel.name.toLowerCase().includes(query)
            );
            renderChannels(filtered);
        }

        // Мобил қурилмаларда менюни очиб/ёпиш
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebarMenu');
            const menuIcon = document.getElementById('menuIcon');
            
            sidebar.classList.toggle('open');
            
            if (sidebar.classList.contains('open')) {
                menuIcon.className = 'fa-solid fa-xmark';
            } else {
                menuIcon.className = 'fa-solid fa-bars';
            }
        }
    </script>
