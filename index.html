<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zokir Media - Firebase Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0a0a0f; --card: #16161e; --gold-solid: #f6d365; --text: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        header { background: var(--card); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f6d365; }
        .admin-panel { display: none; max-width: 700px; margin: 20px auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #f6d365; }
        .input-group { margin-bottom: 15px; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; background: #000; border: 1px solid #334155; color: white; border-radius: 8px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 5%; }
        .movie-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; margin-bottom: 10px; }
        .video-container iframe { width: 100%; height: 100%; border: none; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-gold { background: #f6d365; color: #000; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #f6d365; }
    </style>
</head>
<body>

<header>
    <div>UNIVERSAL MEDIA</div>
    <div id="navBtns"><button class="btn btn-gold" onclick="openLogin()">Админ Кириш</button></div>
</header>

<div id="adminPanel" class="admin-panel">
    <h2 style="color: #f6d365;">Фильм қўшиш</h2>
    <div class="input-group"><input type="text" id="mName" placeholder="Фильм номи"></div>
    <div class="input-group"><textarea id="mEmbed" rows="4" placeholder="Iframe кодни шу ерга жойланг"></textarea></div>
    <div class="input-group">
        <select id="mGenre">
            <option value="Боевик">Боевик</option>
            <option value="Комедия">Комедия</option>
            <option value="Мелодрама">Мелодрама</option>
        </select>
    </div>
    <button class="btn btn-gold" onclick="saveToFirebase()">Сақлаш</button>
</div>

<div class="movie-grid" id="movieGrid"></div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <input type="password" id="passInput" placeholder="Парол" style="padding:10px; margin-bottom:10px;">
        <button class="btn btn-gold" onclick="checkAuth()">Кириш</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAV9u_Go4bIuDlC-vM3rH1T9MwLGwe9H3I",
        authDomain: "universal-media-8f205.firebaseapp.com",
        databaseURL: "https://universal-media-8f205-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal-media-8f205",
        storageBucket: "universal-media-8f205.firebasestorage.app",
        messagingSenderId: "21945142340",
        appId: "1:21945142340:web:796e1d4e85566899b3c011"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let isAdmin = false;

    // Маълумотларни рендер қилувчи асосий функция
    function renderMovies() {
        database.ref('movies').on('value', (snapshot) => {
            const allMovies = snapshot.val() || {};
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';
            
            Object.keys(allMovies).forEach(key => {
                const m = allMovies[key];
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="video-container">${m.embed}</div>
                    <h3>${m.name}</h3>
                    ${isAdmin ? `<button onclick="deleteMovie('${key}')" class="btn" style="background:red; color:white;">Ўчириш</button>` : ''}
                `;
                grid.appendChild(card);
            });
        });
    }

    function saveToFirebase() {
        const name = document.getElementById('mName').value;
        const embed = document.getElementById('mEmbed').value;
        const genre = document.getElementById('mGenre').value;
        if(name && embed) {
            database.ref('movies').push({ name, embed, genre });
            alert("Сақланди!");
        }
    }

    function deleteMovie(key) {
        if(confirm("Ростан ҳам ўчирмоқчимисиз?")) {
            database.ref('movies/' + key).remove();
        }
    }

    function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }

    function checkAuth() {
        if(document.getElementById('passInput').value === "1975") {
            isAdmin = true;
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            renderMovies(); // Админ бўлгач, тугмаларни кўрсатиш учун қайта рендер
        } else { alert("Парол хато!"); }
    }

    // Саҳифа очилиши билан видеоларни юклаш
    renderMovies();
</script>
</body>
</html>
