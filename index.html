<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zokir Media - Firebase Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0a0a0f; --card: #16161e; --gold: linear-gradient(135deg, #f6d365 0%, #fda085 100%); --gold-solid: #f6d365; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        header { background: var(--card); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(246, 211, 101, 0.2); position: sticky; top: 0; z-index: 100; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: #000; }
        .admin-panel { display: none; max-width: 700px; margin: 20px auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(246, 211, 101, 0.3); }
        .input-group { margin-bottom: 15px; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; background: #000; border: 1px solid #334155; color: white; border-radius: 8px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 20px 5%; }
        .movie-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .video-container { background: #000; min-height: 250px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 40px; border-radius: 20px; border: 2px solid var(--gold-solid); text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">UNIVERSAL MEDIA</div>
    <div id="navBtns"><button class="btn btn-gold" onclick="openLogin()">Шахсий кабинет</button></div>
</header>

<div id="adminPanel" class="admin-panel">
    <h2 id="formTitle" style="color: var(--gold-solid); text-align: center;">Фильм қўшиш</h2>
    <input type="hidden" id="editKey">
    <div class="input-group"><input type="text" id="mName" placeholder="Фильм номи"></div>
    <div class="input-group"><textarea id="mEmbed" rows="4" placeholder="Embed код"></textarea></div>
    <button class="btn btn-gold" style="width: 100%;" onclick="saveToFirebase()">Серверга сақлаш</button>
</div>

<div class="movie-grid" id="movieGrid"></div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <input type="password" id="passInput" placeholder="Парол" style="padding:10px; width:100%; margin-bottom:10px; background:#000; color:#fff;">
        <button class="btn btn-gold" onclick="checkAuth()">Кириш</button>
    </div>
</div>

<script>
    const firebaseConfig = { /* Сизнинг config ўзгармади */ };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let isAdmin = false;

    // Оптимизация: Faqat yangi ma'lumot kelganda render qiladi
    database.ref('movies').on('value', (snapshot) => {
        render(snapshot.val() || {});
    });

    function render(data) {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';
        Object.keys(data).forEach(key => {
            const m = data[key];
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <div class="video-container">${m.embed}</div>
                <div style="padding:15px;"><h3>${m.name}</h3></div>
                ${isAdmin ? `<div style="padding:10px;"><button onclick="deleteMovie('${key}')" style="background:red; color:white; border:none; padding:5px 10px;">Ўчириш</button></div>` : ''}
            `;
            grid.appendChild(card);
        });
    }

    function saveToFirebase() {
        const name = document.getElementById('mName').value;
        const embed = document.getElementById('mEmbed').value;
        const key = document.getElementById('editKey').value;

        if(name && embed) {
            if(key) {
                database.ref('movies/' + key).update({ name, embed });
            } else {
                database.ref('movies').push({ name, embed, views: 0 });
            }
            // Панелни ёпмаслик учун resetForm'ни ўзгартирдик
            document.getElementById('mName').value = "";
            document.getElementById('mEmbed').value = "";
            document.getElementById('editKey').value = "";
            alert("Сақланди!");
        }
    }

    function checkAuth() {
        if(document.getElementById('passInput').value === "1975") {
            isAdmin = true;
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            // Админ бўлсак қайта render қиламиз
            database.ref('movies').once('value').then(s => render(s.val()));
        } else { alert("Хато!"); }
    }

    function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
</script>
</body>
</html>
