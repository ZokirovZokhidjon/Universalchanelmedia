<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Studio | Асосий Саҳифа</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: #0d1117; border: 1px solid #30363d; border-radius: 16px; overflow: hidden; transition: 0.3s; }
        .glass-card:hover { border-color: #58a6ff; }
        .gold-text { color: #ffcc00; }
        .admin-panel { display: none; background: #0d1117; border: 2px solid #ffcc00; border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        .input-style { width: 100%; background: #010409; border: 1px solid #30363d; border-radius: 10px; padding: 12px; color: white; outline: none; margin-bottom: 10px; }
        .input-style:focus { border-color: #ffcc00; }
        #image-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter">UNIVERSAL <span class="gold-text">STUDIO</span></h1>
                <p class="text-xs text-blue-400 uppercase tracking-widest">Асосий Янгиликлар Портали</p>
            </div>
            <button onclick="toggleAdmin()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-bold transition">
                <i class="fas fa-user-shield mr-2"></i> Админ
            </button>
        </header>

        <!-- Админ Панел -->
        <div id="adminPanel" class="admin-panel">
            <h2 class="text-xl font-bold gold-text mb-4 uppercase text-center">Янгилик / Хабар Қўшиш</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <input type="text" id="postTitle" placeholder="Сарлавҳа" class="input-style">
                    <input type="text" id="postSource" placeholder="Манба (масалан: Kun.uz)" class="input-style">
                    <select id="postCategory" class="input-style">
                        <option value="Янгиликлар">Янгиликлар</option>
                        <option value="Хабарлар">Хабарлар</option>
                        <option value="Табобат">Табобат</option>
                        <option value="Балиқ ови">Балиқ ови</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Компьютердан расм юклаш:</label>
                    <input type="file" id="postFile" accept="image/*" onchange="previewImg()" class="input-style">
                    <img id="image-preview">
                </div>
            </div>
            <textarea id="postContent" rows="5" placeholder="Хабар матнини ёзинг..." class="input-style"></textarea>
            <div class="flex gap-3">
                <button onclick="savePost()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition uppercase">Сақлаш</button>
                <button onclick="toggleAdmin()" class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-xl transition">Ёпиш</button>
            </div>
        </div>

        <!-- Янгиликлар Сеткаси -->
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-1 bg-blue-600 rounded-full"></div>
            <h2 class="text-2xl font-bold uppercase">Сўнгги Мақолалар</h2>
        </div>
        
        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Янгиликлар шу ерга тушади -->
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[200]">
        <div class="bg-[#0d1117] p-8 rounded-2xl border border-yellow-500 w-80 text-center">
            <h3 class="text-white font-bold mb-4">ПАРОЛЬ КИРИТИНГ</h3>
            <input type="password" id="adminPass" class="input-style text-center" placeholder="****">
            <button onclick="checkPass()" class="w-full bg-yellow-500 text-black font-bold py-2 rounded-lg">КИРИШ</button>
        </div>
    </div>

<script>
    // Firebase Созламалари (Сизники)
    const firebaseConfig = {
        apiKey: "AIzaSyAV9u_Go4bIuDlC-vM3rH1T9MwLGwe9H3I",
        authDomain: "universal-media-8f205.firebaseapp.com",
        databaseURL: "https://universal-media-8f205-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal-media-8f205",
        storageBucket: "universal-media-8f205.firebasestorage.app",
        messagingSenderId: "21945142340",
        appId: "1:21945142340:web:796e1d4e85566899b3c011"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let base64Img = "";
    let isLogged = sessionStorage.getItem('adminLogged') === 'true';

    function toggleAdmin() {
        if (!isLogged) {
            document.getElementById('loginModal').style.display = 'flex';
        } else {
            const panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }
    }

    function checkPass() {
        if (document.getElementById('adminPass').value === "1975") {
            sessionStorage.setItem('adminLogged', 'true');
            location.reload();
        } else { alert("Хато!"); }
    }

    function previewImg() {
        const file = document.getElementById('postFile').files[0];
        const reader = new FileReader();
        reader.onloadend = function() {
            base64Img = reader.result;
            const img = document.getElementById('image-preview');
            img.src = reader.result;
            img.style.display = 'block';
        }
        if (file) reader.readAsDataURL(file);
    }

    function savePost() {
        const title = document.getElementById('postTitle').value;
        const source = document.getElementById('postSource').value;
        const category = document.getElementById('postCategory').value;
        const content = document.getElementById('postContent').value;
        const date = new Date().toLocaleDateString('uz-UZ');

        if (!title || !content || !base64Img) { alert("Ҳамма майдонларни тўлдиринг ва расм юкланг!"); return; }

        db.ref('index_posts').push({
            title, source, category, content, image: base64Img, date
        }).then(() => {
            alert("Янгилик асосий саҳифага қўшилди!");
            location.reload();
        });
    }

    // МАЪЛУМОТЛАРНИ КЎРСАТИШ
    db.ref('index_posts').on('value', (snapshot) => {
        const posts = snapshot.val() || {};
        const container = document.getElementById('news-container');
        container.innerHTML = '';

        Object.keys(posts).reverse().forEach(key => {
            const p = posts[key];
            container.innerHTML += `
                <div class="glass-card flex flex-col">
                    <img src="${p.image}" class="w-full h-48 object-cover">
                    <div class="p-5 flex-1 flex flex-col">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] bg-blue-600/20 text-blue-400 px-2 py-1 rounded font-bold uppercase">${p.category}</span>
                            <span class="text-[10px] text-gray-500">${p.date}</span>
                        </div>
                        <h3 class="text-lg font-bold mb-3 line-clamp-2">${p.title}</h3>
                        <p class="text-sm text-gray-400 line-clamp-3 mb-4">${p.content}</p>
                        <div class="mt-auto pt-4 border-t border-gray-800 flex justify-between items-center">
                            <span class="text-[10px] text-yellow-500 font-bold italic">Манба: ${p.source}</span>
                            ${isLogged ? `<button onclick="deletePost('${key}')" class="text-red-500 text-xs hover:underline">Ўчириш</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
    });

    function deletePost(key) {
        if(confirm("Бу хабарни ўчирмоқчимисиз?")) db.ref('index_posts/' + key).remove();
    }
</script>
</body>
</html>
